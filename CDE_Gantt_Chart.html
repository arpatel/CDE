<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CDE Platform — Development Roadmap Gantt</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',Arial,sans-serif;background:#f0f4f8;color:#1e293b}
  header{background:linear-gradient(135deg,#1F3864,#2E75B6);color:#fff;padding:20px 32px;display:flex;align-items:center;justify-content:space-between}
  header h1{font-size:20px;font-weight:700;letter-spacing:.5px}
  header p{font-size:13px;opacity:.8;margin-top:2px}
  .badge{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);border-radius:20px;padding:4px 14px;font-size:12px}
  .toolbar{background:#fff;border-bottom:1px solid #e2e8f0;padding:12px 32px;display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  .legend{display:flex;gap:16px;flex-wrap:wrap;margin-left:auto}
  .legend-item{display:flex;align-items:center;gap:6px;font-size:12px;color:#475569}
  .legend-dot{width:12px;height:12px;border-radius:3px}
  .filter-btn{padding:5px 14px;border-radius:20px;border:1.5px solid #cbd5e1;background:#fff;font-size:12px;cursor:pointer;transition:all .2s}
  .filter-btn.active,.filter-btn:hover{background:#2E75B6;color:#fff;border-color:#2E75B6}
  .gantt-wrap{padding:24px 32px;overflow-x:auto}
  .gantt{min-width:1100px}
  .gantt-header{display:grid;background:#fff;border-radius:10px 10px 0 0;border:1px solid #e2e8f0;overflow:hidden}
  .month-row{display:flex;border-bottom:1px solid #e2e8f0}
  .task-col-hdr{width:260px;min-width:260px;padding:8px 16px;font-size:12px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.5px;border-right:2px solid #e2e8f0;background:#f8fafc}
  .months{flex:1;display:grid}
  .month-hdr{text-align:center;padding:8px 4px;font-size:11px;font-weight:600;color:#64748b;border-right:1px solid #e2e8f0;background:#f8fafc}
  .week-row{display:flex;border-bottom:1px solid #f1f5f9}
  .week-nums{flex:1;display:grid}
  .sprint-hdr{text-align:center;padding:4px 2px;font-size:9px;color:#94a3b8;border-right:1px solid #f1f5f9}
  .gantt-body{background:#fff;border:1px solid #e2e8f0;border-top:none;border-radius:0 0 10px 10px;overflow:hidden}
  .phase-row{display:flex;align-items:stretch;border-bottom:1px solid #e2e8f0;min-height:36px}
  .phase-row:last-child{border-bottom:none}
  .phase-row.phase-hdr-row{min-height:44px}
  .task-label{width:260px;min-width:260px;padding:0 16px;display:flex;align-items:center;border-right:2px solid #e2e8f0;font-size:13px;gap:8px;cursor:pointer;transition:background .15s}
  .task-label:hover{background:#f8fafc}
  .task-label.phase-title{font-weight:700;font-size:13px;letter-spacing:.3px}
  .task-label.sub{padding-left:32px;font-size:12px;color:#475569}
  .task-label.milestone-lbl{padding-left:32px;font-size:11px;color:#7c3aed;font-style:italic}
  .phase-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}
  .bar-area{flex:1;position:relative;display:flex;align-items:center}
  .bar{position:absolute;height:20px;border-radius:4px;display:flex;align-items:center;padding:0 8px;font-size:10px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:opacity .2s;cursor:default}
  .bar:hover{opacity:.85}
  .bar.phase-bar{height:28px;border-radius:6px;font-size:11px}
  .milestone-diamond{position:absolute;width:12px;height:12px;background:#7c3aed;transform:rotate(45deg);border:2px solid #fff;box-shadow:0 0 0 2px #7c3aed}
  .milestone-label{position:absolute;font-size:10px;color:#7c3aed;font-weight:600;white-space:nowrap;top:50%;transform:translateY(-50%)}
  .today-line{position:absolute;top:0;bottom:0;width:2px;background:#ef4444;opacity:.6;z-index:10}
  .grid-col{position:absolute;top:0;bottom:0;width:1px;background:#f1f5f9}
  .phase-section-divider{background:#f8fafc;border-bottom:2px solid #e2e8f0}
  .stats-row{display:flex;gap:16px;margin-bottom:24px;flex-wrap:wrap}
  .stat-card{background:#fff;border-radius:10px;padding:16px 20px;flex:1;min-width:140px;border:1px solid #e2e8f0;text-align:center}
  .stat-card .val{font-size:28px;font-weight:700;color:#1F3864}
  .stat-card .lbl{font-size:12px;color:#64748b;margin-top:2px}
  .tooltip{position:fixed;background:#1e293b;color:#fff;padding:10px 14px;border-radius:8px;font-size:12px;pointer-events:none;z-index:1000;display:none;max-width:260px;line-height:1.6;box-shadow:0 4px 20px rgba(0,0,0,.3)}
  @media(max-width:700px){.gantt-wrap{padding:12px 8px}.toolbar{padding:10px 12px}header{padding:14px 16px}}
</style>
</head>
<body>

<header>
  <div>
    <h1>Enterprise CDE Platform — Development Roadmap</h1>
    <p>18-Month Delivery Plan · 6 Squads · 36 Sprints</p>
  </div>
  <span class="badge">v1.0</span>
</header>

<div class="toolbar">
  <button class="filter-btn active" onclick="filterPhase('all')">All Phases</button>
  <button class="filter-btn" onclick="filterPhase(1)">Phase 1</button>
  <button class="filter-btn" onclick="filterPhase(2)">Phase 2</button>
  <button class="filter-btn" onclick="filterPhase(3)">Phase 3</button>
  <button class="filter-btn" onclick="filterPhase(4)">Phase 4</button>
  <button class="filter-btn" onclick="filterPhase(5)">Phase 5</button>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#16a34a"></div>Phase 1</div>
    <div class="legend-item"><div class="legend-dot" style="background:#d97706"></div>Phase 2</div>
    <div class="legend-item"><div class="legend-dot" style="background:#dc2626"></div>Phase 3</div>
    <div class="legend-item"><div class="legend-dot" style="background:#2563eb"></div>Phase 4</div>
    <div class="legend-item"><div class="legend-dot" style="background:#7c3aed"></div>Phase 5</div>
    <div class="legend-item"><div class="legend-dot" style="background:#7c3aed;transform:rotate(45deg)"></div>Milestone</div>
  </div>
</div>

<div class="gantt-wrap">
  <div class="stats-row">
    <div class="stat-card"><div class="val">18</div><div class="lbl">Months Total</div></div>
    <div class="stat-card"><div class="val">36</div><div class="lbl">Sprints</div></div>
    <div class="stat-card"><div class="val">42</div><div class="lbl">Team Members</div></div>
    <div class="stat-card"><div class="val">6</div><div class="lbl">Squads</div></div>
    <div class="stat-card"><div class="val">5</div><div class="lbl">Phases</div></div>
    <div class="stat-card"><div class="val">Month 8</div><div class="lbl">MVP Target</div></div>
  </div>
  <div class="gantt" id="gantt"></div>
</div>

<div class="tooltip" id="tooltip"></div>

<script>
const MONTHS = 18;
const SPRINTS = 36; // 2 per month

const PHASE_COLORS = {
  1: '#16a34a', 2: '#d97706', 3: '#dc2626', 4: '#2563eb', 5: '#7c3aed'
};
const PHASE_LIGHT = {
  1: '#dcfce7', 2: '#fef3c7', 3: '#fee2e2', 4: '#dbeafe', 5: '#ede9fe'
};

// Sprints are 0-indexed (0=Sprint1, 35=Sprint36)
const tasks = [
  // Phase 1
  { id:'p1', label:'Phase 1: Foundation & Infrastructure', type:'phase', phase:1, start:0, end:7, desc:'Months 1–4 · Sprints 1–8' },
  { id:'p1t1', label:'Cloud Infra & CI/CD', type:'task', phase:1, start:0, end:1, desc:'EKS, RDS, Redis, S3, GitHub Actions pipeline' },
  { id:'p1t2', label:'Identity & Auth (SSO, MFA)', type:'task', phase:1, start:1, end:4, desc:'Login, JWT, SSO (Entra ID), TOTP MFA, refresh tokens' },
  { id:'p1t3', label:'Multi-tenancy & RLS', type:'task', phase:1, start:3, end:5, desc:'Schema-per-tenant, RLS policies, tenant API context' },
  { id:'p1t4', label:'Org & User Management', type:'task', phase:1, start:4, end:6, desc:'Organisation hierarchy, invitations, RBAC, security groups' },
  { id:'p1t5', label:'Project Module & Audit', type:'task', phase:1, start:6, end:7, desc:'Project CRUD, templates, milestones, audit logging, notifications' },
  { id:'m1', label:'M1: Infra Ready', type:'milestone', phase:1, start:1, desc:'CI/CD deploys to staging' },
  { id:'m2', label:'M2: Auth Live', type:'milestone', phase:1, start:5, desc:'SSO + MFA working end-to-end' },
  { id:'m3', label:'M3: Phase 1 Complete', type:'milestone', phase:1, start:7, desc:'Admin creates tenant, invites users, creates project' },

  // Phase 2
  { id:'p2', label:'Phase 2: Documents, Drawings & Workflows', type:'phase', phase:2, start:8, end:15, desc:'Months 5–8 · Sprints 9–16 · MVP Complete' },
  { id:'p2t1', label:'Folder Hierarchy & Upload', type:'task', phase:2, start:8, end:10, desc:'Folder CRUD, permissions, presigned S3 upload, bulk upload' },
  { id:'p2t2', label:'Version Control & Metadata', type:'task', phase:2, start:9, end:12, desc:'Revisions, check-in/out, metadata, tags, OCR pipeline' },
  { id:'p2t3', label:'Search & Drawing Mgmt', type:'task', phase:2, start:11, end:13, desc:'Elasticsearch full-text search, drawing register, viewer' },
  { id:'p2t4', label:'Workflow Engine', type:'task', phase:2, start:13, end:15, desc:'Template designer, sequential/parallel, SLA, escalation, delegation' },
  { id:'p2t5', label:'RFI, Submittals, Transmittals', type:'task', phase:2, start:14, end:15, desc:'RFI lifecycle, submittal register, transmittal bundling' },
  { id:'p2t6', label:'Meeting Management', type:'task', phase:2, start:15, end:15, desc:'Agenda, minutes, action items, attendance, distribution' },
  { id:'m4', label:'M4: Documents Live', type:'milestone', phase:2, start:11, desc:'Upload, version, search, download documents' },
  { id:'m5', label:'M5: MVP Complete', type:'milestone', phase:2, start:15, desc:'Docs, Drawings, Workflows, RFI, Submittals live in UAT' },

  // Phase 3
  { id:'p3', label:'Phase 3: Field Tools, QA, HSE & Mobile', type:'phase', phase:3, start:16, end:23, desc:'Months 9–12 · Sprints 17–24' },
  { id:'p3t1', label:'Mobile App (React Native)', type:'task', phase:3, start:16, end:18, desc:'iOS + Android scaffold, auth, navigation, offline storage' },
  { id:'p3t2', label:'Offline Sync Engine', type:'task', phase:3, start:17, end:19, desc:'WatermelonDB, conflict resolution, upload queue' },
  { id:'p3t3', label:'Snagging / Punch Lists', type:'task', phase:3, start:18, end:20, desc:'Item CRUD, photo, GPS, drawing pin, assignment, status flow' },
  { id:'p3t4', label:'Quality Management (NCR, QA)', type:'task', phase:3, start:19, end:21, desc:'NCR lifecycle, inspection requests, checklists, test requests' },
  { id:'p3t5', label:'HSE Module', type:'task', phase:3, start:20, end:22, desc:'Incidents, safety observations, toolbox talks, permits, risk assessments' },
  { id:'p3t6', label:'Forms Engine & Tasks', type:'task', phase:3, start:22, end:23, desc:'Dynamic form builder, digital signatures, task management, push notifications' },
  { id:'m6', label:'M6: Mobile Beta', type:'milestone', phase:3, start:18, desc:'App on iOS + Android; offline sync working' },
  { id:'m7', label:'M7: Field Modules Live', type:'milestone', phase:3, start:22, desc:'Snagging, NCR, Incidents live on mobile' },

  // Phase 4
  { id:'p4', label:'Phase 4: BIM, Reporting & Integrations', type:'phase', phase:4, start:24, end:31, desc:'Months 13–16 · Sprints 25–32' },
  { id:'p4t1', label:'BIM Viewer & Model Mgmt', type:'task', phase:4, start:24, end:26, desc:'IFC upload, versioning, federated viewer, element linking, BCF' },
  { id:'p4t2', label:'Asset Register', type:'task', phase:4, start:26, end:28, desc:'Asset CRUD, classification, O&M documents, warranty tracking' },
  { id:'p4t3', label:'Reporting & Analytics', type:'task', phase:4, start:27, end:30, desc:'ClickHouse pipeline, dashboards, KPIs, custom report builder, scheduled delivery' },
  { id:'p4t4', label:'Microsoft 365 Integration', type:'task', phase:4, start:29, end:30, desc:'SharePoint sync, Teams notifications, Outlook calendar' },
  { id:'p4t5', label:'ERP & Scheduling Integrations', type:'task', phase:4, start:30, end:31, desc:'SAP/Oracle sync, Primavera P6, 4D simulation' },
  { id:'p4t6', label:'API Portal & Webhooks', type:'task', phase:4, start:31, end:31, desc:'OpenAPI 3.0 docs, developer portal, webhook framework, Revit add-in' },
  { id:'m8', label:'M8: BIM Live', type:'milestone', phase:4, start:26, desc:'IFC models viewable; elements linked to RFIs/NCRs' },
  { id:'m9', label:'M9: Integrations Live', type:'milestone', phase:4, start:31, desc:'M365, Primavera, SAP connectors working in staging' },

  // Phase 5
  { id:'p5', label:'Phase 5: Hardening & Go-Live', type:'phase', phase:5, start:32, end:35, desc:'Months 17–18 · Sprints 33–36' },
  { id:'p5t1', label:'Performance & Load Testing', type:'task', phase:5, start:32, end:33, desc:'k6 load testing, query optimisation, CDN tuning' },
  { id:'p5t2', label:'Security & Accessibility', type:'task', phase:5, start:32, end:34, desc:'Pen test, WCAG AA remediation, SOC 2 evidence collection' },
  { id:'p5t3', label:'Data Migration & Onboarding', type:'task', phase:5, start:33, end:35, desc:'Migration CLI, import templates, guided tours, i18n (EN/AR/FR)' },
  { id:'p5t4', label:'Pilot Go-Live & Rollout', type:'task', phase:5, start:35, end:35, desc:'Pilot cutover, DR drill, monitoring dashboards, hypercare' },
  { id:'m10', label:'M10: Pen Test Clear', type:'milestone', phase:5, start:34, desc:'No Critical/High findings; WCAG AA pass' },
  { id:'m11', label:'M11: Pilot Go-Live', type:'milestone', phase:5, start:35, desc:'First customer live on production' },
  { id:'m12', label:'M12: General Availability', type:'milestone', phase:5, start:35, desc:'Platform open for all customers' },
];

let currentFilter = 'all';

function filterPhase(f) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  renderGantt();
}

function renderGantt() {
  const wrap = document.getElementById('gantt');
  wrap.innerHTML = '';

  const SPRINT_W = 26; // px per sprint
  const TOTAL_W = SPRINTS * SPRINT_W;
  const LABEL_W = 260;

  // Header
  const hdr = document.createElement('div');
  hdr.className = 'gantt-header';
  hdr.style.display = 'block';

  // Month row
  const monthRow = document.createElement('div');
  monthRow.className = 'month-row';
  const th = document.createElement('div');
  th.className = 'task-col-hdr';
  th.textContent = 'Task / Deliverable';
  monthRow.appendChild(th);
  const monthsDiv = document.createElement('div');
  monthsDiv.style.cssText = `flex:1;display:grid;grid-template-columns:repeat(${MONTHS},1fr)`;
  for (let m = 1; m <= MONTHS; m++) {
    const mh = document.createElement('div');
    mh.className = 'month-hdr';
    mh.textContent = `M${m}`;
    mh.style.borderRight = '1px solid #e2e8f0';
    monthsDiv.appendChild(mh);
  }
  monthRow.appendChild(monthsDiv);
  hdr.appendChild(monthRow);

  // Sprint row
  const sprintRow = document.createElement('div');
  sprintRow.style.cssText = 'display:flex;border-bottom:2px solid #e2e8f0';
  const spacer = document.createElement('div');
  spacer.style.cssText = `width:${LABEL_W}px;min-width:${LABEL_W}px;background:#f8fafc;border-right:2px solid #e2e8f0`;
  sprintRow.appendChild(spacer);
  const sprintNums = document.createElement('div');
  sprintNums.style.cssText = `flex:1;display:grid;grid-template-columns:repeat(${SPRINTS},1fr)`;
  for (let s = 1; s <= SPRINTS; s++) {
    const sh = document.createElement('div');
    sh.className = 'sprint-hdr';
    sh.textContent = `S${s}`;
    sh.style.background = s % 2 === 0 ? '#f8fafc' : '#fff';
    sprintNums.appendChild(sh);
  }
  sprintRow.appendChild(sprintNums);
  hdr.appendChild(sprintRow);
  wrap.appendChild(hdr);

  // Body
  const body = document.createElement('div');
  body.className = 'gantt-body';

  const filtered = currentFilter === 'all' ? tasks : tasks.filter(t => t.phase === currentFilter);

  filtered.forEach((task, idx) => {
    const row = document.createElement('div');
    row.className = 'phase-row' + (task.type === 'phase' ? ' phase-section-divider' : '');
    row.style.minHeight = task.type === 'phase' ? '44px' : task.type === 'milestone' ? '32px' : '36px';
    if (idx % 2 === 0 && task.type === 'task') row.style.background = '#fafbfd';

    // Label
    const lbl = document.createElement('div');
    lbl.className = 'task-label' + (task.type === 'phase' ? ' phase-title' : task.type === 'milestone' ? ' milestone-lbl' : ' sub');

    const dot = document.createElement('div');
    dot.className = 'phase-dot';
    dot.style.background = PHASE_COLORS[task.phase];
    if (task.type === 'milestone') {
      dot.style.width = '8px'; dot.style.height = '8px';
      dot.style.background = '#7c3aed'; dot.style.transform = 'rotate(45deg)';
    }
    lbl.appendChild(dot);
    lbl.appendChild(document.createTextNode(task.label));
    row.appendChild(lbl);

    // Bar area
    const barArea = document.createElement('div');
    barArea.className = 'bar-area';
    barArea.style.position = 'relative';

    // Grid lines (every 2 sprints = 1 month)
    for (let g = 0; g <= SPRINTS; g++) {
      const gl = document.createElement('div');
      gl.className = 'grid-col';
      gl.style.left = (g / SPRINTS * 100) + '%';
      if (g % 2 === 0) gl.style.background = '#e2e8f0';
      barArea.appendChild(gl);
    }

    if (task.type === 'milestone') {
      const pct = (task.start / SPRINTS) * 100;
      const diamond = document.createElement('div');
      diamond.className = 'milestone-diamond';
      diamond.style.left = `calc(${pct}% - 6px)`;
      diamond.style.top = '50%';
      diamond.style.transform = 'translateY(-50%) rotate(45deg)';
      barArea.appendChild(diamond);
    } else {
      const startPct = (task.start / SPRINTS) * 100;
      const widthPct = ((task.end - task.start + 1) / SPRINTS) * 100;
      const bar = document.createElement('div');
      bar.className = 'bar' + (task.type === 'phase' ? ' phase-bar' : '');
      bar.style.left = `calc(${startPct}% + 2px)`;
      bar.style.width = `calc(${widthPct}% - 4px)`;

      const color = PHASE_COLORS[task.phase];
      if (task.type === 'phase') {
        bar.style.background = `linear-gradient(135deg, ${color}cc, ${color})`;
        bar.style.border = `2px solid ${color}`;
      } else {
        bar.style.background = `linear-gradient(90deg, ${color}dd, ${color}aa)`;
      }
      bar.textContent = task.label;

      bar.addEventListener('mouseenter', (e) => showTooltip(e, task));
      bar.addEventListener('mousemove', (e) => moveTooltip(e));
      bar.addEventListener('mouseleave', hideTooltip);
      barArea.appendChild(bar);
    }

    row.appendChild(barArea);
    body.appendChild(row);
  });

  wrap.appendChild(body);
}

function showTooltip(e, task) {
  const tt = document.getElementById('tooltip');
  tt.style.display = 'block';
  const sprintStart = task.start + 1;
  const sprintEnd = task.end !== undefined ? task.end + 1 : task.start + 1;
  const monthStart = Math.ceil(sprintStart / 2);
  const monthEnd = Math.ceil(sprintEnd / 2);
  tt.innerHTML = `<strong>${task.label}</strong><br/>${task.desc || ''}<br/><span style="opacity:.7">Sprint ${sprintStart}${sprintEnd !== sprintStart ? '–' + sprintEnd : ''} · Month ${monthStart}${monthEnd !== monthStart ? '–' + monthEnd : ''}</span>`;
  moveTooltip(e);
}
function moveTooltip(e) {
  const tt = document.getElementById('tooltip');
  tt.style.left = (e.clientX + 14) + 'px';
  tt.style.top = (e.clientY - 10) + 'px';
}
function hideTooltip() {
  document.getElementById('tooltip').style.display = 'none';
}

renderGantt();
</script>
</body>
</html>
