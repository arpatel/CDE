services:
  postgres:
    image: postgres:16-alpine
    container_name: cde-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: cde
      POSTGRES_PASSWORD: cde_dev_password
      POSTGRES_DB: cde
    ports:
      # Host 5432 → container. (Local PostgreSQL 18 runs on 5432? No — it's on
      # 5433, so 5432 is free for the bundled dev DB.)
      - "5432:5432"
    volumes:
      - cde_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cde -d cde"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: cde-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - cde_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # OnlyOffice Document Server — in-browser Office editor (docx/xlsx/pptx).
  # The API signs the editor config + verifies save-back callbacks with
  # ONLYOFFICE_JWT_SECRET. The container reaches the host API via
  # host.docker.internal (see API_INTERNAL_URL in .env).
  onlyoffice:
    image: onlyoffice/documentserver:8.1
    container_name: cde-onlyoffice
    restart: unless-stopped
    ports:
      - "8082:80"
    environment:
      - JWT_ENABLED=true
      - JWT_SECRET=${ONLYOFFICE_JWT_SECRET}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - cde_onlyoffice:/var/www/onlyoffice/Data
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost/healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 20

volumes:
  cde_pgdata:
  cde_redisdata:
  cde_onlyoffice:
