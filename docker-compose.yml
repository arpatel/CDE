services:
  postgres:
    image: postgres:16-alpine
    container_name: cde-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: cde
      POSTGRES_PASSWORD: cde_dev_password
      POSTGRES_DB: cde
    ports:
      - "5432:5432"
    volumes:
      - cde_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cde -d cde"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: cde-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - cde_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  cde_pgdata:
  cde_redisdata:
